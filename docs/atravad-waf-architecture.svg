<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6"/>
    </marker>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="boxUI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="boxFirebase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="boxWAF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="boxOrigin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg1)"/>
  <text x="450" y="34" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="bold">ATRAVAD WAF Architecture &amp; Traffic Flow</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">Dashboard &#8596; WAF Proxy (via Firebase) &#8596; Traffic: User &#8594; WAF (AWS or Data Center) &#8594; Origin</text>

  <!-- Admin section - balanced left -->
  <rect x="48" y="78" width="176" height="126" rx="8" fill="rgba(30,58,95,0.6)" stroke="#334155" stroke-width="1"/>
  <text x="136" y="100" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">ADMIN / MANAGEMENT</text>
  <rect x="64" y="114" width="144" height="38" rx="6" fill="url(#boxUI)"/>
  <text x="136" y="136" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Dashboard (Next.js UI)</text>
  <rect x="64" y="158" width="144" height="32" rx="6" fill="#475569"/>
  <text x="136" y="178" text-anchor="middle" fill="#e2e8f0" font-size="11">Admin Browser</text>

  <!-- Firebase - balanced spacing -->
  <rect x="260" y="96" width="168" height="88" rx="8" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
  <text x="344" y="118" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">CONFIG STORE</text>
  <rect x="280" y="132" width="128" height="38" rx="6" fill="url(#boxFirebase)"/>
  <text x="344" y="154" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Firebase Firestore</text>
  <text x="344" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">apps, policies, tenants</text>

  <!-- WAF Edge - shifted left to balance -->
  <rect x="464" y="76" width="200" height="132" rx="8" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1"/>
  <text x="564" y="98" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">WAF EDGE (AWS or Data Center)</text>
  <rect x="484" y="112" width="160" height="40" rx="6" fill="url(#boxWAF)"/>
  <text x="564" y="137" text-anchor="middle" fill="white" font-size="13" font-weight="bold">WAF Proxy Server</text>
  <rect x="484" y="158" width="160" height="32" rx="6" fill="#065f46"/>
  <text x="564" y="178" text-anchor="middle" fill="#a7f3d0" font-size="11">ModSecurity</text>

  <!-- ORIGIN - wider, more padding, not compressed -->
  <rect x="700" y="96" width="152" height="112" rx="8" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
  <text x="776" y="118" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="bold">ORIGIN</text>
  <rect x="716" y="132" width="120" height="44" rx="6" fill="url(#boxOrigin)"/>
  <text x="776" y="157" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Origin Server</text>

  <!-- End User -->
  <rect x="400" y="380" width="100" height="50" rx="8" fill="rgba(148,163,184,0.3)" stroke="#64748b" stroke-width="1"/>
  <text x="450" y="405" text-anchor="middle" fill="#e2e8f0" font-weight="bold">End User / Visitor</text>
  <text x="450" y="420" text-anchor="middle" fill="#94a3b8" font-size="10">(Customer traffic)</text>

  <!-- DNS -->
  <rect x="580" y="380" width="100" height="50" rx="8" fill="rgba(100,116,139,0.4)" stroke="#64748b" stroke-width="1"/>
  <text x="630" y="405" text-anchor="middle" fill="#e2e8f0" font-weight="bold">DNS</text>
  <text x="630" y="420" text-anchor="middle" fill="#94a3b8" font-size="10">A / CNAME to WAF IP</text>

  <!-- Arrows: Admin path -->
  <path d="M 224 152 L 258 152" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowblue)"/>
  <rect x="228" y="134" width="96" height="14" rx="3" fill="rgba(15,23,42,0.9)" stroke="#3b82f6" stroke-width="1"/>
  <text x="276" y="144" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="bold">Read/Write config</text>
  <path d="M 428 152 L 462 152" stroke="#10b981" stroke-width="2" fill="none"/>
  <polygon points="456 148 466 152 456 156" fill="#10b981"/>
  <rect x="358" y="134" width="108" height="14" rx="3" fill="rgba(15,23,42,0.9)" stroke="#10b981" stroke-width="1"/>
  <text x="412" y="144" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="bold">Read apps (real-time)</text>

  <!-- Arrows: Traffic flow - smaller labels -->
  <path d="M 450 380 L 450 330 L 630 330 L 630 380" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <rect x="362" y="345" width="76" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="bold">1. Request site</text>
  <path d="M 630 320 L 564 228" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <polygon points="568 232 564 222 560 230" fill="#f59e0b"/>
  <rect x="578" y="262" width="98" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#f59e0b" stroke-width="1"/>
  <text x="627" y="272" text-anchor="middle" fill="#fbbf24" font-size="8" font-weight="bold">2. Resolve to WAF IP</text>
  <path d="M 564 208 L 564 120" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  <polygon points="560 128 568 120 564 126" fill="#e2e8f0"/>
  <rect x="572" y="158" width="78" height="14" rx="3" fill="rgba(15,23,42,0.9)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="611" y="168" text-anchor="middle" fill="#e2e8f0" font-size="8" font-weight="bold">3. HTTP/HTTPS</text>
  <path d="M 664 140 L 698 140" stroke="#a5b4fc" stroke-width="2" fill="none"/>
  <polygon points="694 136 704 140 694 144" fill="#a5b4fc"/>
  <rect x="662" y="122" width="52" height="14" rx="3" fill="rgba(15,23,42,0.9)" stroke="#a5b4fc" stroke-width="1"/>
  <text x="688" y="132" text-anchor="middle" fill="#c4b5fd" font-size="8" font-weight="bold">4. Forward</text>
  <path d="M 776 208 L 776 264 L 450 264 L 450 380" stroke="#6ee7b7" stroke-width="2" fill="none"/>
  <polygon points="454 376 450 366 450 372" fill="#6ee7b7"/>
  <rect x="362" y="304" width="76" height="14" rx="3" fill="rgba(15,23,42,0.85)" stroke="#6ee7b7" stroke-width="1"/>
  <text x="400" y="314" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="bold">5-6. Response</text>

  <!-- Legend -->
  <rect x="48" y="458" width="804" height="50" rx="6" fill="rgba(15,23,42,0.8)" stroke="#334155"/>
  <text x="64" y="482" fill="#94a3b8" font-size="11">Data center deployment: Run proxy-server-standalone.js on-prem; set WAF_REGIONS to your DC public IP. UI and traffic flow unchanged.</text>
</svg>
